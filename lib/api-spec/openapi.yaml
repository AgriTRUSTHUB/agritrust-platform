openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AgriTRUST Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User profiles
  - name: dashboard
    description: Dashboard & analytics
  - name: marketplace
    description: Marketplace listings
  - name: dealwise
    description: DealWise AI negotiation
  - name: qualityscan
    description: QualityScan AI grading
  - name: landshare
    description: LandShare land leasing
  - name: harvestfinance
    description: Harvest finance & loans
  - name: barter
    description: Barter exchange
  - name: agrihaul
    description: AgriHaul logistics
  - name: community
    description: Community & social
  - name: impact
    description: ImpactLedger sustainability
  - name: accounting
    description: Farm accounting
  - name: farmscore
    description: FarmScore credit
  - name: notifications
    description: Notifications
  - name: alerts
    description: Theft alerts
  - name: disputes
    description: Disputes
  - name: mentorship
    description: Mentorship network
  - name: academy
    description: AgriAcademy courses

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ── Users ─────────────────────────────────────────────────────────────────
  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user profile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user profile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  # ── Dashboard ─────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get platform-wide stats
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /dashboard/activity:
    get:
      operationId: getActivityFeed
      tags: [dashboard]
      summary: Get recent activity feed
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/user-summary:
    get:
      operationId: getUserDashboardSummary
      tags: [dashboard]
      summary: Get personal dashboard summary
      responses:
        "200":
          description: User summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDashboardSummary"

  # ── Marketplace ───────────────────────────────────────────────────────────
  /marketplace/listings:
    get:
      operationId: listListings
      tags: [marketplace]
      summary: List marketplace listings
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
        - name: minPrice
          in: query
          schema: { type: number }
        - name: maxPrice
          in: query
          schema: { type: number }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Listings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingsPage"
    post:
      operationId: createListing
      tags: [marketplace]
      summary: Create a listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"

  /marketplace/listings/{id}:
    get:
      operationId: getListing
      tags: [marketplace]
      summary: Get listing by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
    patch:
      operationId: updateListing
      tags: [marketplace]
      summary: Update listing
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
    delete:
      operationId: deleteListing
      tags: [marketplace]
      summary: Delete listing
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /marketplace/featured:
    get:
      operationId: getFeaturedListings
      tags: [marketplace]
      summary: Get featured/trending listings
      responses:
        "200":
          description: Featured listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"

  # ── DealWise ──────────────────────────────────────────────────────────────
  /dealwise/negotiations:
    get:
      operationId: listNegotiations
      tags: [dealwise]
      summary: List my negotiations
      responses:
        "200":
          description: Negotiations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Negotiation"
    post:
      operationId: createNegotiation
      tags: [dealwise]
      summary: Start a negotiation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NegotiationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Negotiation"

  /dealwise/negotiations/{id}:
    get:
      operationId: getNegotiation
      tags: [dealwise]
      summary: Get negotiation detail
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Negotiation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NegotiationDetail"

  /dealwise/negotiations/{id}/offer:
    post:
      operationId: submitOffer
      tags: [dealwise]
      summary: Submit counter offer
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfferInput"
      responses:
        "200":
          description: Updated negotiation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Negotiation"

  /dealwise/negotiations/{id}/accept:
    post:
      operationId: acceptNegotiation
      tags: [dealwise]
      summary: Accept deal
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Negotiation"

  # ── QualityScan ───────────────────────────────────────────────────────────
  /qualityscan/scans:
    get:
      operationId: listScans
      tags: [qualityscan]
      summary: List quality scans
      responses:
        "200":
          description: Scans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QualityScan"
    post:
      operationId: createScan
      tags: [qualityscan]
      summary: Submit a quality scan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QualityScanInput"
      responses:
        "201":
          description: Scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QualityScan"

  /qualityscan/scans/{id}:
    get:
      operationId: getScan
      tags: [qualityscan]
      summary: Get scan result
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Scan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QualityScan"

  # ── LandShare ─────────────────────────────────────────────────────────────
  /landshare/listings:
    get:
      operationId: listLandListings
      tags: [landshare]
      summary: List land listings
      parameters:
        - name: region
          in: query
          schema: { type: string }
        - name: minHectares
          in: query
          schema: { type: number }
        - name: maxPrice
          in: query
          schema: { type: number }
      responses:
        "200":
          description: Land listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LandListing"
    post:
      operationId: createLandListing
      tags: [landshare]
      summary: List land for lease
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LandListingInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LandListing"

  /landshare/listings/{id}:
    get:
      operationId: getLandListing
      tags: [landshare]
      summary: Get land listing
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Land listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LandListing"

  # ── Harvest Finance ───────────────────────────────────────────────────────
  /harvest-finance/loans:
    get:
      operationId: listLoans
      tags: [harvestfinance]
      summary: List loan applications
      responses:
        "200":
          description: Loans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LoanApplication"
    post:
      operationId: applyForLoan
      tags: [harvestfinance]
      summary: Apply for a loan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoanInput"
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanApplication"

  /harvest-finance/loans/{id}:
    get:
      operationId: getLoan
      tags: [harvestfinance]
      summary: Get loan application
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Loan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanApplication"

  # ── Barter ────────────────────────────────────────────────────────────────
  /barter/items:
    get:
      operationId: listBarterItems
      tags: [barter]
      summary: List barter items
      responses:
        "200":
          description: Barter items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BarterItem"
    post:
      operationId: createBarterItem
      tags: [barter]
      summary: Post a barter item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BarterItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BarterItem"

  /barter/trades:
    get:
      operationId: listTrades
      tags: [barter]
      summary: List my barter trades
      responses:
        "200":
          description: Trades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BarterTrade"
    post:
      operationId: proposeTrade
      tags: [barter]
      summary: Propose a barter trade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BarterTradeInput"
      responses:
        "201":
          description: Trade proposed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BarterTrade"

  # ── AgriHaul ──────────────────────────────────────────────────────────────
  /agrihaul/shipments:
    get:
      operationId: listShipments
      tags: [agrihaul]
      summary: List shipments
      responses:
        "200":
          description: Shipments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Shipment"
    post:
      operationId: createShipment
      tags: [agrihaul]
      summary: Book a shipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShipmentInput"
      responses:
        "201":
          description: Shipment booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipment"

  /agrihaul/shipments/{id}:
    get:
      operationId: getShipment
      tags: [agrihaul]
      summary: Get shipment details
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Shipment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipment"

  # ── Community ─────────────────────────────────────────────────────────────
  /community/posts:
    get:
      operationId: listPosts
      tags: [community]
      summary: List community posts
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunityPost"
    post:
      operationId: createPost
      tags: [community]
      summary: Create community post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityPost"

  /community/posts/{id}:
    get:
      operationId: getPost
      tags: [community]
      summary: Get post
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityPost"

  /community/posts/{id}/like:
    post:
      operationId: likePost
      tags: [community]
      summary: Like/unlike a post
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityPost"

  /community/posts/{id}/comments:
    get:
      operationId: listComments
      tags: [community]
      summary: List comments for post
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createComment
      tags: [community]
      summary: Comment on a post
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  # ── ImpactLedger ──────────────────────────────────────────────────────────
  /impact/stats:
    get:
      operationId: getImpactStats
      tags: [impact]
      summary: Get platform impact statistics
      responses:
        "200":
          description: Impact stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImpactStats"

  /impact/activities:
    get:
      operationId: listImpactActivities
      tags: [impact]
      summary: List sustainability activities
      responses:
        "200":
          description: Activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ImpactActivity"
    post:
      operationId: logImpactActivity
      tags: [impact]
      summary: Log an impact activity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImpactActivityInput"
      responses:
        "201":
          description: Activity logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImpactActivity"

  # ── Farm Accounting ───────────────────────────────────────────────────────
  /accounting/transactions:
    get:
      operationId: listTransactions
      tags: [accounting]
      summary: List farm transactions
      parameters:
        - name: type
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string }
        - name: to
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
    post:
      operationId: createTransaction
      tags: [accounting]
      summary: Record a transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /accounting/summary:
    get:
      operationId: getAccountSummary
      tags: [accounting]
      summary: Get financial summary
      responses:
        "200":
          description: Financial summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountSummary"

  # ── FarmScore ─────────────────────────────────────────────────────────────
  /farmscore:
    get:
      operationId: getFarmScore
      tags: [farmscore]
      summary: Get FarmScore credit rating
      responses:
        "200":
          description: Farm score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FarmScore"

  # ── Notifications ─────────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications
      parameters:
        - name: unread
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications read
      responses:
        "200":
          description: Done
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Theft Alerts ──────────────────────────────────────────────────────────
  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List theft alerts
      responses:
        "200":
          description: Alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TheftAlert"
    post:
      operationId: createAlert
      tags: [alerts]
      summary: Report theft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TheftAlertInput"
      responses:
        "201":
          description: Alert created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TheftAlert"

  /alerts/{id}:
    get:
      operationId: getAlert
      tags: [alerts]
      summary: Get theft alert
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TheftAlert"

  # ── Disputes ──────────────────────────────────────────────────────────────
  /disputes:
    get:
      operationId: listDisputes
      tags: [disputes]
      summary: List disputes
      responses:
        "200":
          description: Disputes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Dispute"
    post:
      operationId: createDispute
      tags: [disputes]
      summary: File a dispute
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisputeInput"
      responses:
        "201":
          description: Dispute filed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispute"

  /disputes/{id}:
    get:
      operationId: getDispute
      tags: [disputes]
      summary: Get dispute
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Dispute
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispute"

  # ── Mentorship ────────────────────────────────────────────────────────────
  /mentorship/mentors:
    get:
      operationId: listMentors
      tags: [mentorship]
      summary: List available mentors
