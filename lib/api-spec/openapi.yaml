    Course:
      type: object
      required: [id, title, category, level, durationHours, enrollmentCount, rating, createdAt]
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: ["string", "null"] }
        category: { type: string }
        level: { type: string }
        durationHours: { type: number }
        thumbnailUrl: { type: ["string", "null"] }
        instructorName: { type: string }
        enrollmentCount: { type: integer }
        rating: { type: number }
        isFree: { type: boolean }
        modules:
          type: array
          items:
            type: object
            required: [title, lessonCount]
            properties:
              title: { type: string }
              lessonCount: { type: integer }
        createdAt: { type: string, format: date-time }

    Enrollment:
      type: object
      required: [id, courseId, userId, status, progressPercent, enrolledAt]
      properties:
        id: { type: integer }
        courseId: { type: integer }
        courseTitle: { type: ["string", "null"] }
        userId: { type: integer }
        status: { type: string }
        progressPercent: { type: number }
        completedAt: { type: ["string", "null"] }
        certificateUrl: { type: ["string", "null"] }
        enrolledAt: { type: string, format: date-time }
